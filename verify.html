<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rift | Secure Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7289da;
            --primary-glow: rgba(114, 137, 218, 0.4);
            --bg-dark: #0c0c0e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a0a0a8;
            --success: #43b581;
            --danger: #f04747;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(114, 137, 218, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        .verify-card {
            width: 100%;
            max-width: 450px;
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 32px;
            color: var(--primary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status-container {
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn:hover {
            background: #5b73c7;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .success-text { 
            color: var(--success); 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 18px;
        }
        .error-text { color: var(--danger); font-weight: 600; }

        #debug-info {
            margin-top: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.05);
            word-break: break-all;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="verify-card" id="card">
        <div class="icon-box" id="icon">
            <i class="fas fa-shield-halved"></i>
        </div>
        <h1 id="title">Security Check</h1>
        <p id="message">Please wait while we secure your connection to the server.</p>
        
        <div class="status-container" id="status">
            <div class="loader"></div>
            <span>Analyzing browser environment...</span>
        </div>

        <div id="debug-info"></div>
    </div>

    <script>
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function getFingerprint() {
            const data = {
                screen: {
                    w: window.screen.width,
                    h: window.screen.height,
                    d: window.screen.colorDepth
                },
                ua: navigator.userAgent,
                lang: navigator.language,
                langs: navigator.languages,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                hardware: {
                    cores: navigator.hardwareConcurrency,
                    mem: navigator.deviceMemory
                }
            };

            // Canvas Fingerprint
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200;
                canvas.height = 50;
                ctx.textBaseline = "top";
                ctx.font = "14px 'Outfit', Arial";
                ctx.textBaseline = "alphabetic";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125,1,62,20);
                ctx.fillStyle = "#069";
                ctx.fillText("Rift-Security-Auth", 2, 15);
                ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                ctx.fillText("Rift-Security-Auth", 4, 17);
                data.canvas = canvas.toDataURL();
            } catch(e) {}

            // WebGL Fingerprint
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    data.webgl = {
                        vendor: gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL),
                        renderer: gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL)
                    };
                }
            } catch(e) {}

            const json = JSON.stringify(data);
            const hash = await sha256(json);
            return { hash, data };
        }

        async function startVerification() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('t');

            if (!token) {
                showError("Invalid Session", "No verification token provided. Trying to find an easter egg? You won't find any..?");
                return;
            }

            try {
                const { hash, data } = await getFingerprint();
                
                // UX delay
                await new Promise(r => setTimeout(r, 1500));

                const response = await fetch('https://api.rift.baby/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        fingerprint: hash,
                        metadata: data
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showSuccess();
                } else {
                    if (result.flagged) {
                        showError("Security Alert", result.error || "Blocked due to potential ban evasion. :(");
                    } else {
                        showError("Verification Failed", result.error || "Something went wrong...How did you manage to find this though?");
                    }
                }
            } catch (err) {
                showError("System Error", "Could not connect to the security server.");
            }
        }

        function showSuccess() {
            const icon = document.getElementById('icon');
            icon.innerHTML = '<i class="fas fa-check-circle" style="color: var(--success)"></i>';
            icon.style.borderColor = 'var(--success)';
            icon.style.transform = 'scale(1.1)';
            
            document.getElementById('title').innerText = "Verified Successfully";
            document.getElementById('message').innerText = "Security check passed. You may close this window.";
            document.getElementById('status').innerHTML = '<span class="success-text"><i class="fas fa-check"></i> Verification Complete</span>';
        }

        function showError(title, msg) {
            const icon = document.getElementById('icon');
            icon.innerHTML = '<i class="fas fa-exclamation-triangle" style="color: var(--danger)"></i>';
            icon.style.borderColor = 'var(--danger)';
            icon.style.transform = 'scale(1)';

            document.getElementById('title').innerText = title;
            document.getElementById('message').innerText = msg;
            document.getElementById('status').innerHTML = '<button class="btn" onclick="location.reload()"><i class="fas fa-redo"></i> Try Again</button>';
        }

        window.onload = startVerification;
    </script>
</body>
</html>
